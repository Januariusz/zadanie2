name: Build, Scan & Push Docker Image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub (cache)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning (amd64 only)
        uses: docker/build-push-action@v5
        with:
          load: true
          tags: weather-app:scan
          cache-from: type=registry,ref=kjanusz884/weather-app-cache:cache
          cache-to: type=registry,ref=kjanusz884/weather-app-cache:cache,mode=max

      - name: Scan for CVE (block on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: weather-app:scan
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Build & Push multi-arch to GHCR
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/januariusz/weather-app:latest
          cache-from: type=registry,ref=kjanusz884/weather-app-cache:cache
          cache-to: type=registry,ref=kjanusz884/weather-app-cache:cache,mode=max
